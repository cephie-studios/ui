# .github/workflows/publish.yml
# Fallback: manually created releases will also trigger publish
name: Publish (manual release)
on:
  release:
    types: [created]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - uses: oven-sh/setup-bun@v2
      - run: npm install && npm run build
      - run: npm publish --access public

  publish-github:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@cephie-studios'
      - uses: oven-sh/setup-bun@v2
      - run: npm install && npm run build
      - name: Set package name for GitHub Packages scope
        run: node -e "const p=require('./package.json'); p.name='@cephie-studios/ui'; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2));"
      - run: npm publish --access public --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}